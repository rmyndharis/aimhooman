name: aimhooman
description: keeps AI session files and attribution out of commits
inputs:
  base:
    description: base of the range to scan (triple-dot merge base applies); an all-zero object ID includes the root commit
    required: true
  head:
    description: head of the range to scan
    required: true
  profile:
    description: policy profile to enforce (clean, strict, compliance)
    required: false
    default: strict
  version:
    description: aimhooman npm version to install (pin this; the action tag does not pin the CLI)
    required: false
    default: latest
runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: 24
    - name: Install aimhooman
      run: npm install -g @rmyndharis/aimhooman@"$AIMHOOMAN_VERSION"
      shell: bash
      env:
        AIMHOOMAN_VERSION: ${{ inputs.version }}
    - name: Check the introduced commits
      run: aimhooman check --range "$BASE...$HEAD" --profile "$PROFILE"
      shell: bash
      env:
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
        PROFILE: ${{ inputs.profile }}
