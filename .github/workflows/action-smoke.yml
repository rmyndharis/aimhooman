name: action smoke test

# Manual end-to-end check of the composite action at the repository root: it
# resolves action.yml, installs the published npm package, and scans a range.
# Run it after a release, with the previous and new release tags as the range.
# The local `uses: ./` is also what lets actionlint check action.yml: the
# linter only reads action metadata for actions a workflow uses.
on:
  workflow_dispatch:
    inputs:
      base:
        description: base of the range to scan, for example the previous release tag
        required: true
      head:
        description: head of the range to scan, for example the new release tag
        required: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./
        with:
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}
